name: Build and Test
on: [push, pull_request]
permissions:
  contents: read
  checks: write

jobs:
  bat:
    name: Build and Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Configure npm for public registry
        run: |
          rm -f .npmrc
          npm config set registry https://registry.npmjs.org/
      - name: Perform npm tasks
        run: npm run ci
      - uses: actions/upload-artifact@v4
        with:
          name: built-action
          path: |
            **/*
            !node_modules/

  integ:
    needs: bat
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-14]
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: built-action
      - name: Perform 'setup-matlab'
        uses: matlab-actions/setup-matlab@v2
        with:
          products: |
            MATLAB_Test
            Simulink
            Simulink_Test
            Simulink_Coverage
      - name: Run MATLAB Tests
        continue-on-error: true
        uses: ./
        with:
          source-folder: sample
          startup-options: -logfile output.log
          code-coverage-summary-view: true
        # env:
          # GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-${{ matrix.os }}
          path: |
            matlabCoverageResults*.json
          if-no-files-found: warn  
  coverage-summary:
    needs: integ
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: built-action
      
      # Download all coverage artifacts
      - name: Download all coverage artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: coverage-data-*
          path: coverage-artifacts
      
      # Process and aggregate coverage data
      - name: Aggregate and display coverage
        uses: ./
        with:
          # Add a new input to indicate this is aggregation mode
          aggregate-coverage: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}    
